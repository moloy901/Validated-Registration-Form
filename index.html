<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registration Form</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="page-shell">
    <section class="form-panel" aria-labelledby="form-title">
      <div class="heading-group">
        <p class="eyebrow">Account Setup</p>
        <h1 id="form-title">User Registration</h1>
      </div>

      <form id="registrationForm" novalidate>
        <label for="name">Name</label>
        <input type="text" id="name" name="name" placeholder="Enter your full name">

        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="you@company.com">

        <label for="age">Age</label>
        <input type="number" id="age" name="age" placeholder="Enter your age (18-60)">

        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Minimum 6 characters">

        <div class="form-actions">
          <button type="submit" class="primary-btn">Complete Registration</button>
          <button type="reset" class="secondary-btn">Cancel</button>
        </div>
      </form>
    </section>
  </main>

  <dialog id="successDialog" class="success-dialog">
    <div class="dialog-content">
      <h2>Registration Confirmed</h2>
      <p id="successMessage">Your registration was completed successfully.</p>
      <button id="closeDialog" type="button">Close</button>
    </div>
  </dialog>

  <script src="script.js"></script>
</body>
</html>
